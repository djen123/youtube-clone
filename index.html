<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VDEOplus</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="index.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<div class="container-fluid py-3">

  <!-- NAVBAR -->
  <nav class="navbar navbar-dark bg-black rounded mb-3 px-3 d-flex justify-content-between">
    <a class="navbar-brand d-flex align-items-center">
      <img src="./assets/youtube.png" width="35" class="me-2">
      <span>VDEOplus</span>
    </a>

    <div class="d-flex">
      <input id="input" class="form-control me-2" placeholder="Search videos...">
      <button id="btn" class="btn btn-danger">Search</button>
    </div>
  </nav>

  <!-- FILTER -->
  <div class="d-flex mb-3">
    <select id="filterInput" class="form-select w-auto" onchange="searchFilter()">
      <option value="relevance">Relevance</option>
      <option value="viewCount">Most Viewed</option>
      <option value="date">Latest</option>
      <option value="title">Title A–Z</option>
    </select>
  </div>

  <!-- LOADER -->
  <div id="loader" class="text-center my-4 d-none">
    <div class="spinner-border text-danger"></div>
  </div>

  <!-- MAIN LAYOUT -->
  <div class="row">

    <!-- SIDEBAR -->
    <div class="col-2">
      <div id="sidebar" class="bg-black text-light p-3 rounded">
        <h5 class="mb-3">Categories</h5>

        <ul class="list-group list-group-flush">
          <li class="list-group-item bg-black text-light category" data-cat="home">Home</li>
          <li class="list-group-item bg-black text-light category" data-cat="trending">Trending</li>
          <li class="list-group-item bg-black text-light category" data-cat="music">Music</li>
          <li class="list-group-item bg-black text-light category" data-cat="gaming">Gaming</li>
          <li class="list-group-item bg-black text-light category" data-cat="news">News</li>
          <li class="list-group-item bg-black text-light category" data-cat="sports">Sports</li>
          <li class="list-group-item bg-black text-light category" data-cat="movies">Movies</li>
          <li class="list-group-item bg-black text-light category" data-cat="learning">Learning</li>
          <li class="list-group-item bg-black text-light category" data-cat="fashion">Fashion & Beauty</li>
          <li class="list-group-item bg-black text-light category" data-cat="live">Live</li>
        </ul>
      </div>
    </div>

    <!-- VIDEO LIST -->
    <div class="col-10">
      <div id="video-list" class="row g-3"></div>
    </div>

  </div>
</div>

<script src="index.js"></script>
</body>
</html>
